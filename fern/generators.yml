# yaml-language-server: $schema=https://schema.buildwithfern.dev/generators-yml.json
default-group: publish
readme:
  apiName: "Junction"
  introduction: "Power Every Diagnostic Touchpoint – at Scale. Integrate 300+ wearables, streamline lab operations, and build your own lab testing experience spanning all 50 states – with a single API."
  apiReferenceLink: "https://docs.junction.com/"
api:
  specs:
    - openapi: ./openapi/openapi.json
      overrides: ./openapi/overrides.yml
      origin: "https://api.tryvital.io/openapi.json"
      settings:
        title-as-schema-name: false
        coerce-enums-to-literals: true
        type-dates-as-strings: true
        object-query-parameters: false
        wrap-references-to-nullable-in-optional: true
        coerce-optional-schemas-to-nullable: true
        path-parameter-order: spec-order
  settings:
    path-parameter-order: spec-order
groups:
  java-sdk:
    generators:
      - name: fernapi/fern-java-sdk
        version: 4.8.3
        autorelease: true
        output:
          location: maven
          coordinate: com.junction:junction-java
          username: ${JRELEASER_DEPLOY_MAVEN_MAVENCENTRAL_USERNAME}
          password: ${JRELEASER_DEPLOY_MAVEN_MAVENCENTRAL_PASSWORD}
          signature:
            keyId: ${GPG_KEYID}
            password: ${JRELEASER_GPG_PASSPHRASE}
            secretKey: ${JRELEASER_GPG_SECRET_KEY}
        config:
          package-prefix: com.junction.api
          publish-to: central
          base-api-exception-class-name: ApiError
          client-class-name: Junction
          enable-forward-compatible-enums: true
        github:
          repository: junction-api/junction-java
          mode: pull-request
        smart-casing: false
  node-sdk:
    generators:
      - name: fernapi/fern-typescript-sdk
        version: 3.69.2
        autorelease: true
        config:
          namespaceExport: Junction

          noSerdeLayer: false
          omitUndefined: false
          skipResponseValidation: false

          fileResponseType: binary-response
          formDataSupport: Node18
          fetchSupport: native
          packageManager: pnpm
          testFramework: vitest
        output:
          location: npm
          package-name: '@junction-api/sdk'
          token: OIDC
        github:
          repository: junction-api/junction-typescript
          mode: pull-request
        smart-casing: false
  python-sdk:
    generators:
      - name: fernapi/fern-python-sdk
        version: 5.12.1
        autorelease: true
        output:
          location: pypi
          package-name: junction-api-sdk
          token: ${PYPI_TOKEN_JUNCTION}
        github:
          repository: junction-api/junction-python
          mode: pull-request
        config:
          package_name: "junction"
          client_class_name: Junction
          pydantic_config:
            enum_type: forward_compatible_python_enums
            use_pydantic_field_aliases: true
  go-sdk:
    generators:
      - name: fernapi/fern-go-sdk
        version: 1.40.2
        autorelease: true
        github:
          repository: junction-api/junction-go
          mode: pull-request
        config:
          enableWireTests: false
        smart-casing: false
  postman:
    generators:
      - name: fernapi/fern-postman
        version: 0.4.3
        output:
          location: local-file-system
          path: ../postman
        smart-casing: false
